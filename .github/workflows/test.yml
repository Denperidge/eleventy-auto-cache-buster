name: Run tests

on: [push, pull_request, workflow_call]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm test
